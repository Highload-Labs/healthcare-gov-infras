events {}

http {
    upstream backend {
        server healthcare-gov-backend-backend-1:8080;
        server healthcare-gov-backend-backend-2:8080;
        server healthcare-gov-backend-backend-3:8080;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}