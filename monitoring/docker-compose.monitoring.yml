services:
  prometheus:
    image: prom/prometheus:v3.12.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - healthcare-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter
    pid: host
    ports:
      - "9100:9100"
    networks:
      - healthcare-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1-security-01
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./dashboards/storage:/etc/grafana/dashboards
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - healthcare-network
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.31.1
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - healthcare-network
    restart: unless-stopped

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  healthcare-network:
    external: true