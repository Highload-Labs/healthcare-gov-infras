services:
  backend:
    image: mmizu/healthcare-backend
    env_file:
      - ../env/app.env
    networks:
      - healthcare-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  healthcare-network:
    external: true